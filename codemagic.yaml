# Codemagic CI/CD — Note Quest iOS (Capacitor).
# One-time setup in the Codemagic UI:
#   • Connect an App Store Connect API key as an integration named "CodemagicASC".
#   • Create an environment group "revenuecat" with RC_IOS_KEY = your RevenueCat *public* iOS SDK key.
#   • Register the bundle id com.musicappstudio.notequest in App Store Connect.
# The ios/ native project is generated on the fly (npx cap add ios) so it need not be committed.

workflows:
  ios-release:
    name: Note Quest iOS
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: CodemagicASC
    environment:
      groups:
        - revenuecat            # provides RC_IOS_KEY (embedded into www/native.js by npm run build)
      vars:
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        BUNDLE_ID: "com.musicappstudio.notequest"
      node: 22
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install npm dependencies
        script: npm ci
      - name: Build web bundle (www/) + native RevenueCat bridge
        script: npm run build            # reads RC_IOS_KEY from the revenuecat group
      - name: Add iOS platform if missing
        script: |
          if [ ! -d "ios/App" ]; then npx cap add ios; fi
      - name: Generate app icons & splash
        script: npm run assets || echo "skipping asset generation (no assets/ source)"
      - name: Capacitor sync (copy web assets + install CocoaPods)
        script: npx cap sync ios
      - name: Set up code signing
        script: xcode-project use-profiles
      - name: Set build number
        script: |
          cd ios/App
          agvtool new-version -all "$BUILD_NUMBER" || true
      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        # beta_groups:
        #   - Internal Testers
